version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: cmm-postgres
    environment:
      POSTGRES_DB: community_mind_mirror
      POSTGRES_USER: cmm_user
      POSTGRES_PASSWORD: cmm_password_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmm_user -d community_mind_mirror"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cmm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
